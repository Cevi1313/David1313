name: Run Forex Bot

on:
  schedule:
    - cron: '*/5 * * * 1-5'   # setiap 5 menit, Senin-Jumat
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true    # ← ini menghilangkan warning deprecation
    steps:
      - uses: actions/checkout@main
      - name: Setup Python
        uses: actions/setup-python@main
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install yfinance pandas numpy python-telegram-bot
      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python sinyal1_bot.py
