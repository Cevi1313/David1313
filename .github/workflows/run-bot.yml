name: Run Forex Bot

on:
  schedule:
    - cron: '0 */2 * * *'   # setiap 2 jam
  workflow_dispatch:         # supaya bisa dijalankan manual untuk tes

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6          # ✅ v4 → v6
      - name: Setup Python
        uses: actions/setup-python@v6      # ✅ v5 → v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install yfinance pandas numpy requests schedule python-telegram-bot==13.15
      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python sinyal1_bot.py
